<div class="employee-list-container">
  <div class="hrms-card shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
      <div>
        <h4 class="text-primary fw-bold mb-0">Employee Directory</h4>
        <p class="text-muted small mb-0">Manage and filter staff records</p>
      </div>
      <button class="btn btn-primary btn-hrms shadow-sm" routerLink="/employees/add">
        <i class="bi bi-person-plus-fill me-2"></i>Add Employee
      </button>
    </div>
    
    <div class="mb-4">
      <div class="input-group search-group shadow-sm rounded-3">
        <span class="input-group-text border-0 bg-white ps-3">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input type="text" class="form-control border-0 py-2 ms-n1" 
               placeholder="Search by name, position, or department..." 
               [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange($event)">
      </div>
    </div>

    <div class="table-responsive rounded-3">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Employee Info</th>
            <th>Position & Dept</th>
            <th>Account Number</th>
            <th>Status</th>
            <th class="text-end pe-4">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let emp of employees">
            <td class="ps-3">
              <div class="fw-bold text-dark">{{ emp.name }}</div>
              <small class="text-muted">{{ emp.email }}</small>
            </td>
            <td>
              <div class="small fw-semibold">{{ emp.position }}</div>
              <span class="badge bg-soft-primary text-primary px-2 py-1">{{ emp.department }}</span>
            </td>
            <td><code class="acc-code">{{ emp.accountNumber }}</code></td>
            <td>
              <span [ngClass]="emp.employmentStatus === 'Active' ? 'status-active' : 'status-pending'">
                <i class="bi bi-circle-fill smaller me-1"></i> {{ emp.employmentStatus }}
              </span>
            </td>
            <td class="text-end pe-4">
              <button class="btn btn-sm text-success me-2" [routerLink]="['/salary', emp.id]" title="Manage Salary">
                <i class="bi bi-cash-coin me-1"></i> Salary
              </button>

              <button class="btn btn-sm text-primary me-2" [routerLink]="['/employees/edit', emp.id]" title="Edit Employee">
                <i class="bi bi-pencil-square me-1"></i> Edit
              </button>

              <button class="btn btn-sm text-danger" (click)="deleteEmployee(emp.id)" title="Delete Employee">
                <i class="bi bi-trash3 me-1"></i> Delete
              </button>
            </td>
          </tr>
          
          <tr *ngIf="employees.length === 0">
            <td colspan="5" class="text-center py-5 text-muted">
              <i class="bi bi-folder2-open display-6 d-block mb-3"></i>
              No records found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
