<div class="employee-form-container mt-4">
  <div class="hrms-card shadow-lg border-0">
    <div class="form-header mb-4 pb-2 border-bottom">
      <h3 class="fw-bold text-primary mb-1">
        <i class="bi" [ngClass]="isEditMode ? 'bi-pencil-square' : 'bi-person-plus-fill'"></i>
        {{ isEditMode ? 'Update' : 'Add New' }} Employee
      </h3>
      <p class="text-muted small">Fill in all fields to maintain accurate HR records</p>
    </div>

    <div class="form-body">
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Full Name</label>
            <input type="text" formControlName="name" class="form-control custom-input" placeholder="e.g. John Doe">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Email Address</label>
            <input type="email" formControlName="email" class="form-control custom-input" placeholder="name@example.com">
          </div>
          
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Phone Number</label>
            <input type="text" formControlName="phoneNumber" class="form-control custom-input" placeholder="+880...">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Position</label>
            <input type="text" formControlName="position" class="form-control custom-input" placeholder="e.g. Software Engineer">
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold small">Department</label>
            <select formControlName="department" class="form-select custom-input">
              <option value="" disabled selected>Select Department</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>
          
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Account Number</label>
            <input type="text" formControlName="accountNumber" class="form-control custom-input" placeholder="Bank Account Details">
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold small">Employment Status</label>
            <select formControlName="employmentStatus" class="form-select custom-input">
              <option value="Active">Active</option>
              <option value="On Leave">On Leave</option>
              <option value="Terminated">Terminated</option>
            </select>
          </div>
        </div>

        <div class="mt-5 d-flex gap-3 justify-content-start border-top pt-4">
          <button type="submit" class="btn btn-primary btn-hrms px-5 shadow-sm" [disabled]="employeeForm.invalid">
            {{ isEditMode ? 'Update Record' : 'Save Employee' }}
          </button>
          <button type="button" class="btn btn-light btn-hrms px-4 border" routerLink="/employees">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
